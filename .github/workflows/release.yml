name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: target/x86_64-pc-windows-msvc/release/context-snipe.exe
            artifact: context-snipe-x86_64-pc-windows.exe

          - os: macos-latest
            target: x86_64-apple-darwin
            binary: target/x86_64-apple-darwin/release/context-snipe
            artifact: context-snipe-x86_64-apple-darwin

          - os: macos-latest
            target: aarch64-apple-darwin
            binary: target/aarch64-apple-darwin/release/context-snipe
            artifact: context-snipe-aarch64-apple-darwin

          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary: target/x86_64-unknown-linux-musl/release/context-snipe
            artifact: context-snipe-x86_64-linux

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            binary: target/aarch64-unknown-linux-musl/release/context-snipe
            artifact: context-snipe-aarch64-linux
            use_cross: true

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl-tools (x86_64 Linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update -q && sudo apt-get install -y musl-tools

      - name: Install cross (aarch64 Linux)
        if: matrix.use_cross == true
        uses: taiki-e/install-action@cross

      - name: Build with cross
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Build with cargo
        if: matrix.use_cross != true
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: cp "${{ matrix.binary }}" "${{ matrix.artifact }}"

      - name: Compute checksum
        shell: bash
        run: |
          if command -v sha256sum &>/dev/null; then
            sha256sum "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"
          else
            shasum -a 256 "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: context-snipe-*
          generate_release_notes: true
